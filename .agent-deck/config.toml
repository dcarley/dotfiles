# Agent Deck Configuration
# All options: https://github.com/asheshgoplani/agent-deck/blob/main/skills/agent-deck/references/config-reference.md

default_tool = "claude"
theme = "dark"

[claude]
  dangerous_mode = false
  auto_mode = true
  use_teammate_mode = true

[groups.metrics.claude]
  env_file = "~/.agent-deck/metrics.envrc"

[worktree]
  auto_cleanup = false
  path_template = "{repo-root}/_worktrees/{branch}"
  branch_prefix = "$USER/"

[fork]
  inherit_from_parent = true

[updates]
  check_enabled = false
  notify_in_cli = false
